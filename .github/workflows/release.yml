name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cache cibuildwheel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/cibuildwheel
            ~/Library/Caches/cibuildwheel
            ~\AppData\Local\pypa\cibuildwheel\Cache
          key: ${{ runner.os }}-cibw-${{ hashFiles('pyproject.toml', '.github/workflows/release.yml') }}
          restore-keys: |
            ${{ runner.os }}-cibw-

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.1.4
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "pp* *musllinux*"

          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_ARCHS_WINDOWS: "AMD64"

          CIBW_BEFORE_BUILD: |
            python -m pip install -U pip
            python -m pip install -U cmake ninja

          CIBW_BUILD_FRONTEND: "build"
          CIBW_BUILD_VERBOSITY: "1"

          CIBW_ENVIRONMENT: >
            PIP_PREFER_BINARY=1
            PIP_ONLY_BINARY="numpy,scipy"

          CIBW_TEST_COMMAND: "python -c \"import pysrat; import pysrat._core; import pysrat.marlib_cf1; import pysrat.nhpp; print('import ok')\""

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Build sdist
        run: |
          python -m pip install -U pip build
          python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]

    permissions:
      contents: read

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}